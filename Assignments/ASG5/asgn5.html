<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment 5 - Three.js World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      font-family: monospace;
      font-size: 14px;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 6px;
      pointer-events: none;
      z-index: 10;
    }
    #loading {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: #111;
      color: #fff;
      font-family: monospace;
      font-size: 20px;
      z-index: 100;
      transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="loading">Loading world...</div>
  <div id="info">
    WASD / Arrow keys to move | Mouse to look | Scroll to zoom<br>
    Click to enable controls
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ===================== SCENE SETUP =====================
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x87CEEB, 0.012);

    const camera = new THREE.PerspectiveCamera(
      60, window.innerWidth / window.innerHeight, 0.1, 1000
    );
    camera.position.set(0, 5, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // ===================== CONTROLS =====================
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.maxPolarAngle = Math.PI / 2.05;
    controls.minDistance = 3;
    controls.maxDistance = 60;
    controls.target.set(0, 1, 0);

    // ===================== TEXTURE LOADER =====================
    const textureLoader = new THREE.TextureLoader();

    // Helper to create a solid color texture
    function makeColorTexture(color) {
      const canvas = document.createElement('canvas');
      canvas.width = 64;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, 64, 64);
      return new THREE.CanvasTexture(canvas);
    }

    // Helper to create a patterned texture
    function makePatternTexture(color1, color2, gridSize) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      const cellSize = 256 / gridSize;
      for (let i = 0; i < gridSize; i++) {
        for (let j = 0; j < gridSize; j++) {
          ctx.fillStyle = (i + j) % 2 === 0 ? color1 : color2;
          ctx.fillRect(i * cellSize, j * cellSize, cellSize, cellSize);
        }
      }
      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      return tex;
    }

    // Helper to create a brick texture
    function makeBrickTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(0, 0, 256, 256);
      const brickH = 32;
      const brickW = 64;
      ctx.strokeStyle = '#654321';
      ctx.lineWidth = 3;
      for (let row = 0; row < 8; row++) {
        const offset = row % 2 === 0 ? 0 : brickW / 2;
        for (let col = -1; col < 5; col++) {
          ctx.strokeRect(col * brickW + offset, row * brickH, brickW, brickH);
          // Add slight color variation
          ctx.fillStyle = `hsl(20, ${40 + Math.random() * 20}%, ${30 + Math.random() * 15}%)`;
          ctx.fillRect(col * brickW + offset + 2, row * brickH + 2, brickW - 4, brickH - 4);
        }
      }
      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      return tex;
    }

    // Helper to create a grass texture
    function makeGrassTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#3a7d3a';
      ctx.fillRect(0, 0, 512, 512);
      for (let i = 0; i < 3000; i++) {
        const x = Math.random() * 512;
        const y = Math.random() * 512;
        ctx.fillStyle = `hsl(${100 + Math.random() * 40}, ${50 + Math.random() * 30}%, ${25 + Math.random() * 25}%)`;
        ctx.fillRect(x, y, 2, 6);
      }
      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      tex.repeat.set(10, 10);
      return tex;
    }

    // Helper for wood texture
    function makeWoodTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#8B6914';
      ctx.fillRect(0, 0, 256, 256);
      for (let i = 0; i < 30; i++) {
        const y = Math.random() * 256;
        ctx.strokeStyle = `rgba(60, 40, 10, ${0.2 + Math.random() * 0.3})`;
        ctx.lineWidth = 1 + Math.random() * 2;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(256, y + (Math.random() - 0.5) * 20);
        ctx.stroke();
      }
      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      return tex;
    }

    // Helper for stone/path texture
    function makeStoneTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#888';
      ctx.fillRect(0, 0, 256, 256);
      for (let i = 0; i < 40; i++) {
        const x = Math.random() * 256;
        const y = Math.random() * 256;
        const r = 10 + Math.random() * 25;
        ctx.fillStyle = `hsl(0, 0%, ${45 + Math.random() * 25}%)`;
        ctx.beginPath();
        ctx.ellipse(x, y, r, r * 0.8, Math.random() * Math.PI, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.RepeatWrapping;
      return tex;
    }

    // ===================== SKYBOX =====================
    // Create a procedural skybox using CubeTexture from canvas
    function createSkybox() {
      const size = 512;
      const textures = [];

      for (let i = 0; i < 6; i++) {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        // Gradient sky
        const gradient = ctx.createLinearGradient(0, 0, 0, size);
        gradient.addColorStop(0, '#1a3a5c');
        gradient.addColorStop(0.3, '#4a90d9');
        gradient.addColorStop(0.5, '#87CEEB');
        gradient.addColorStop(0.7, '#b8e0f0');
        gradient.addColorStop(1.0, '#e8f4f8');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, size, size);

        // Add clouds
        for (let c = 0; c < 8; c++) {
          const cx = Math.random() * size;
          const cy = Math.random() * size * 0.5;
          ctx.fillStyle = `rgba(255, 255, 255, ${0.15 + Math.random() * 0.2})`;
          for (let p = 0; p < 5; p++) {
            ctx.beginPath();
            ctx.ellipse(
              cx + (Math.random() - 0.5) * 80,
              cy + (Math.random() - 0.5) * 20,
              30 + Math.random() * 50,
              15 + Math.random() * 20,
              0, 0, Math.PI * 2
            );
            ctx.fill();
          }
        }
        textures.push(canvas);
      }

      const cubeTexture = new THREE.CubeTexture(textures);
      cubeTexture.needsUpdate = true;
      scene.background = cubeTexture;
    }
    createSkybox();

    // ===================== LIGHTS (3 different types) =====================

    // 1. Ambient Light
    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    // 2. Directional Light (sun)
    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5);
    dirLight.position.set(15, 25, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 80;
    dirLight.shadow.camera.left = -30;
    dirLight.shadow.camera.right = 30;
    dirLight.shadow.camera.top = 30;
    dirLight.shadow.camera.bottom = -30;
    scene.add(dirLight);

    // 3. Hemisphere Light
    const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x3a7d3a, 0.4);
    scene.add(hemiLight);

    // Extra: Point lights for lanterns
    const lanternLight1 = new THREE.PointLight(0xffaa44, 2, 12);
    lanternLight1.position.set(-6, 3.5, -3);
    scene.add(lanternLight1);

    const lanternLight2 = new THREE.PointLight(0xffaa44, 2, 12);
    lanternLight2.position.set(6, 3.5, -3);
    scene.add(lanternLight2);

    // ===================== GROUND =====================
    const grassTex = makeGrassTexture();
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(80, 80),
      new THREE.MeshStandardMaterial({ map: grassTex, roughness: 0.9 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // ===================== STONE PATH =====================
    const stoneTex = makeStoneTexture();
    stoneTex.repeat.set(4, 1);
    const path = new THREE.Mesh(
      new THREE.PlaneGeometry(3, 30),
      new THREE.MeshStandardMaterial({ map: stoneTex, roughness: 0.85 })
    );
    path.rotation.x = -Math.PI / 2;
    path.position.set(0, 0.01, 5);
    path.receiveShadow = true;
    scene.add(path);

    // ===================== HOUSE (multiple shapes) =====================
    const brickTex = makeBrickTexture();
    const woodTex = makeWoodTexture();

    // House body (Box)
    const houseBody = new THREE.Mesh(
      new THREE.BoxGeometry(6, 4, 5),
      new THREE.MeshStandardMaterial({ map: brickTex, roughness: 0.8 })
    );
    houseBody.position.set(0, 2, -8);
    houseBody.castShadow = true;
    houseBody.receiveShadow = true;
    scene.add(houseBody);

    // Roof (Cone)
    const roof = new THREE.Mesh(
      new THREE.ConeGeometry(5, 2.5, 4),
      new THREE.MeshStandardMaterial({ color: 0x8B0000, roughness: 0.7 })
    );
    roof.position.set(0, 5.25, -8);
    roof.rotation.y = Math.PI / 4;
    roof.castShadow = true;
    scene.add(roof);

    // Door (Box)
    const door = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 2.2, 0.15),
      new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.7 })
    );
    door.position.set(0, 1.1, -5.45);
    scene.add(door);

    // Door knob (Sphere)
    const doorKnob = new THREE.Mesh(
      new THREE.SphereGeometry(0.08, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0xCCAA00, metalness: 0.8, roughness: 0.2 })
    );
    doorKnob.position.set(0.35, 1.1, -5.35);
    scene.add(doorKnob);

    // Windows (Box with emissive)
    function createWindow(x, y, z) {
      const win = new THREE.Mesh(
        new THREE.BoxGeometry(0.9, 0.9, 0.1),
        new THREE.MeshStandardMaterial({
          color: 0x88ccff,
          emissive: 0x224466,
          emissiveIntensity: 0.3,
          roughness: 0.1,
          metalness: 0.1,
          transparent: true,
          opacity: 0.7
        })
      );
      win.position.set(x, y, z);
      scene.add(win);
    }
    createWindow(-1.5, 2.5, -5.45);
    createWindow(1.5, 2.5, -5.45);

    // Chimney (Box)
    const chimney = new THREE.Mesh(
      new THREE.BoxGeometry(0.8, 2, 0.8),
      new THREE.MeshStandardMaterial({ map: brickTex, roughness: 0.9 })
    );
    chimney.position.set(2, 5.5, -8);
    chimney.castShadow = true;
    scene.add(chimney);

    // ===================== TREES (Cylinders + Spheres/Cones) =====================
    function createTree(x, z, scale = 1) {
      const group = new THREE.Group();

      // Trunk (Cylinder)
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.2 * scale, 0.3 * scale, 2 * scale, 8),
        new THREE.MeshStandardMaterial({ color: 0x4a3020, roughness: 0.9 })
      );
      trunk.position.y = scale;
      trunk.castShadow = true;
      group.add(trunk);

      // Foliage layers (Cones)
      const foliageMat = new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.8 });
      for (let i = 0; i < 3; i++) {
        const foliage = new THREE.Mesh(
          new THREE.ConeGeometry((1.5 - i * 0.3) * scale, 1.5 * scale, 8),
          foliageMat
        );
        foliage.position.y = (2.5 + i * 1.0) * scale;
        foliage.castShadow = true;
        group.add(foliage);
      }

      group.position.set(x, 0, z);
      scene.add(group);
      return group;
    }

    // Create a forest
    createTree(-10, -5, 1.2);
    createTree(-8, -10, 0.9);
    createTree(-12, -8, 1.0);
    createTree(10, -6, 1.1);
    createTree(12, -3, 0.8);
    createTree(8, -12, 1.3);
    createTree(-6, 8, 1.0);
    createTree(-9, 12, 0.7);
    createTree(7, 10, 1.1);
    createTree(11, 8, 0.9);

    // ===================== ROUND TREES (Sphere foliage) =====================
    function createRoundTree(x, z, scale = 1) {
      const group = new THREE.Group();
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15 * scale, 0.25 * scale, 1.8 * scale, 8),
        new THREE.MeshStandardMaterial({ color: 0x5a3a20, roughness: 0.9 })
      );
      trunk.position.y = 0.9 * scale;
      trunk.castShadow = true;
      group.add(trunk);

      const foliage = new THREE.Mesh(
        new THREE.SphereGeometry(1.2 * scale, 12, 12),
        new THREE.MeshStandardMaterial({ color: 0x3a8a2a, roughness: 0.85 })
      );
      foliage.position.y = 2.5 * scale;
      foliage.castShadow = true;
      group.add(foliage);

      group.position.set(x, 0, z);
      scene.add(group);
    }
    createRoundTree(-4, 5, 0.9);
    createRoundTree(4, 6, 1.0);
    createRoundTree(-3, -3, 0.7);

    // ===================== FENCE (Boxes + Cylinders) =====================
    function createFenceSection(x, z, rotY = 0) {
      const group = new THREE.Group();
      const rail = new THREE.Mesh(
        new THREE.BoxGeometry(3, 0.15, 0.1),
        new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.8 })
      );
      rail.position.y = 0.7;
      group.add(rail);

      const rail2 = rail.clone();
      rail2.position.y = 0.35;
      group.add(rail2);

      for (let i = -1.2; i <= 1.2; i += 0.6) {
        const post = new THREE.Mesh(
          new THREE.CylinderGeometry(0.05, 0.05, 1, 6),
          new THREE.MeshStandardMaterial({ color: 0x6B5914, roughness: 0.8 })
        );
        post.position.set(i, 0.5, 0);
        post.castShadow = true;
        group.add(post);
      }

      group.position.set(x, 0, z);
      group.rotation.y = rotY;
      scene.add(group);
    }

    // Fence around the front yard
    for (let i = -3; i <= 3; i += 3) {
      if (i === 0) continue; // gap for path
      createFenceSection(i * 1.5 + (i > 0 ? 1.5 : -1.5), -2);
    }

    // ===================== BENCH (Boxes) =====================
    function createBench(x, z, rotY = 0) {
      const group = new THREE.Group();
      const seat = new THREE.Mesh(
        new THREE.BoxGeometry(2, 0.1, 0.6),
        new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.7 })
      );
      seat.position.y = 0.5;
      group.add(seat);

      const back = new THREE.Mesh(
        new THREE.BoxGeometry(2, 0.6, 0.08),
        new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.7 })
      );
      back.position.set(0, 0.85, -0.26);
      group.add(back);

      // Legs
      for (let lx of [-0.8, 0.8]) {
        for (let lz of [-0.2, 0.2]) {
          const leg = new THREE.Mesh(
            new THREE.BoxGeometry(0.08, 0.5, 0.08),
            new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.7 })
          );
          leg.position.set(lx, 0.25, lz);
          group.add(leg);
        }
      }

      group.position.set(x, 0, z);
      group.rotation.y = rotY;
      scene.add(group);
    }
    createBench(5, 2, -Math.PI / 6);
    createBench(-5, 3, Math.PI / 4);

    // ===================== LANTERNS (Cylinder + Sphere + PointLight) =====================
    function createLantern(x, z) {
      const group = new THREE.Group();
      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.08, 3, 8),
        new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.6, roughness: 0.3 })
      );
      pole.position.y = 1.5;
      pole.castShadow = true;
      group.add(pole);

      const lamp = new THREE.Mesh(
        new THREE.SphereGeometry(0.25, 12, 12),
        new THREE.MeshStandardMaterial({
          color: 0xffdd88,
          emissive: 0xffaa44,
          emissiveIntensity: 1.5,
          transparent: true,
          opacity: 0.9
        })
      );
      lamp.position.y = 3.2;
      group.add(lamp);

      group.position.set(x, 0, z);
      scene.add(group);
    }
    createLantern(-6, -3);
    createLantern(6, -3);

    // ===================== WELL (Cylinder + Torus) =====================
    const wellBase = new THREE.Mesh(
      new THREE.CylinderGeometry(1, 1.1, 1.2, 16),
      new THREE.MeshStandardMaterial({ map: makeStoneTexture(), roughness: 0.9 })
    );
    wellBase.position.set(8, 0.6, -6);
    wellBase.castShadow = true;
    scene.add(wellBase);

    const wellRim = new THREE.Mesh(
      new THREE.TorusGeometry(1.05, 0.1, 8, 24),
      new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.6 })
    );
    wellRim.position.set(8, 1.2, -6);
    wellRim.rotation.x = Math.PI / 2;
    scene.add(wellRim);

    // Well roof supports
    for (let angle of [0, Math.PI]) {
      const support = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.06, 2, 6),
        new THREE.MeshStandardMaterial({ map: woodTex })
      );
      support.position.set(
        8 + Math.cos(angle) * 0.9,
        2.2,
        -6 + Math.sin(angle) * 0.9
      );
      support.castShadow = true;
      scene.add(support);
    }

    // Well roof
    const wellRoof = new THREE.Mesh(
      new THREE.ConeGeometry(1.4, 1, 4),
      new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8 })
    );
    wellRoof.position.set(8, 3.5, -6);
    wellRoof.rotation.y = Math.PI / 4;
    wellRoof.castShadow = true;
    scene.add(wellRoof);

    // ===================== POND (Cylinder with reflective material) =====================
    const pond = new THREE.Mesh(
      new THREE.CylinderGeometry(3, 3, 0.1, 32),
      new THREE.MeshStandardMaterial({
        color: 0x2266aa,
        metalness: 0.3,
        roughness: 0.1,
        transparent: true,
        opacity: 0.85
      })
    );
    pond.position.set(-8, 0.05, 6);
    scene.add(pond);

    // Rocks around pond (Dodecahedrons)
    for (let i = 0; i < 10; i++) {
      const angle = (i / 10) * Math.PI * 2;
      const r = 3.2 + Math.random() * 0.5;
      const rock = new THREE.Mesh(
        new THREE.DodecahedronGeometry(0.2 + Math.random() * 0.3, 0),
        new THREE.MeshStandardMaterial({
          color: new THREE.Color().setHSL(0, 0, 0.3 + Math.random() * 0.2),
          roughness: 0.9
        })
      );
      rock.position.set(
        -8 + Math.cos(angle) * r,
        0.15,
        6 + Math.sin(angle) * r
      );
      rock.rotation.set(Math.random(), Math.random(), Math.random());
      rock.castShadow = true;
      scene.add(rock);
    }

    // ===================== FLOWER GARDEN (Small shapes) =====================
    function createFlower(x, z) {
      const group = new THREE.Group();
      // Stem
      const stem = new THREE.Mesh(
        new THREE.CylinderGeometry(0.02, 0.02, 0.4, 4),
        new THREE.MeshStandardMaterial({ color: 0x228B22 })
      );
      stem.position.y = 0.2;
      group.add(stem);

      // Petals (torus)
      const petalColor = [0xff6b9d, 0xffdd44, 0xff4444, 0xff88cc, 0xaa44ff][Math.floor(Math.random() * 5)];
      const petals = new THREE.Mesh(
        new THREE.TorusGeometry(0.12, 0.05, 6, 8),
        new THREE.MeshStandardMaterial({ color: petalColor })
      );
      petals.position.y = 0.42;
      petals.rotation.x = Math.PI / 2;
      group.add(petals);

      // Center
      const center = new THREE.Mesh(
        new THREE.SphereGeometry(0.06, 8, 8),
        new THREE.MeshStandardMaterial({ color: 0xffee00 })
      );
      center.position.y = 0.42;
      group.add(center);

      group.position.set(x, 0, z);
      scene.add(group);
    }

    for (let i = 0; i < 15; i++) {
      createFlower(
        -3 + Math.random() * 2.5,
        3 + Math.random() * 3
      );
    }

    // ===================== ANIMATED OBJECT: Spinning Windmill =====================
    const windmillGroup = new THREE.Group();

    // Tower
    const tower = new THREE.Mesh(
      new THREE.CylinderGeometry(0.4, 0.7, 5, 8),
      new THREE.MeshStandardMaterial({ color: 0xccbbaa, roughness: 0.8 })
    );
    tower.position.y = 2.5;
    tower.castShadow = true;
    windmillGroup.add(tower);

    // Blades hub
    const bladesGroup = new THREE.Group();
    bladesGroup.position.set(0, 5, 0.5);

    const hubMat = new THREE.MeshStandardMaterial({ color: 0x664422 });
    const hub = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), hubMat);
    bladesGroup.add(hub);

    // 4 blades
    for (let i = 0; i < 4; i++) {
      const blade = new THREE.Mesh(
        new THREE.BoxGeometry(0.3, 2, 0.05),
        new THREE.MeshStandardMaterial({ color: 0xddc090, roughness: 0.6 })
      );
      blade.position.y = 1.1;
      const bladeArm = new THREE.Group();
      bladeArm.add(blade);
      bladeArm.rotation.z = (i / 4) * Math.PI * 2;
      bladesGroup.add(bladeArm);
    }

    windmillGroup.add(bladesGroup);
    windmillGroup.position.set(-12, 0, -12);
    scene.add(windmillGroup);

    // ===================== EXTRA OBJECTS TO HIT 20+ =====================

    // Barrel (Cylinder) near house
    const barrel = new THREE.Mesh(
      new THREE.CylinderGeometry(0.45, 0.4, 1, 12),
      new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.8 })
    );
    barrel.position.set(3.5, 0.5, -6);
    barrel.castShadow = true;
    scene.add(barrel);

    // Barrel rings (Torus)
    for (let y of [0.15, 0.5, 0.85]) {
      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(0.44, 0.025, 8, 16),
        new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.6 })
      );
      ring.position.set(3.5, y, -6);
      ring.rotation.x = Math.PI / 2;
      scene.add(ring);
    }

    // Mushrooms (Cylinder + Sphere)
    function createMushroom(x, z) {
      const g = new THREE.Group();
      const stem = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.08, 0.25, 8),
        new THREE.MeshStandardMaterial({ color: 0xeeddcc })
      );
      stem.position.y = 0.125;
      g.add(stem);

      const cap = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2),
        new THREE.MeshStandardMaterial({ color: 0xcc2222, roughness: 0.6 })
      );
      cap.position.y = 0.25;
      g.add(cap);

      g.position.set(x, 0, z);
      scene.add(g);
    }
    createMushroom(-7, -4);
    createMushroom(-6.5, -3.5);
    createMushroom(9, 3);

    // Stepping stones in path (flat cylinders)
    for (let i = 0; i < 5; i++) {
      const stone = new THREE.Mesh(
        new THREE.CylinderGeometry(0.35, 0.35, 0.05, 8),
        new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.9 })
      );
      stone.position.set(
        (Math.random() - 0.5) * 0.5,
        0.03,
        -2 + i * 1.5 + Math.random() * 0.3
      );
      stone.rotation.y = Math.random() * Math.PI;
      scene.add(stone);
    }

    // ===================== ANIMATED BOUNCING BALL (Wow factor) =====================
    const bouncingBall = new THREE.Mesh(
      new THREE.SphereGeometry(0.3, 16, 16),
      new THREE.MeshStandardMaterial({
        color: 0xff4444,
        metalness: 0.2,
        roughness: 0.3
      })
    );
    bouncingBall.position.set(3, 1, 3);
    bouncingBall.castShadow = true;
    scene.add(bouncingBall);

    // ===================== LOAD 3D MODEL (GLB/GLTF) =====================
    // Load a free model from the web
    const gltfLoader = new GLTFLoader();
    let loadedModel = null;

    // Using a public domain / CC0 model
    gltfLoader.load(
      'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Duck/glTF-Binary/Duck.glb',
      (gltf) => {
        loadedModel = gltf.scene;
        loadedModel.scale.set(1.5, 1.5, 1.5);
        loadedModel.position.set(-8, 0.05, 6); // On the pond
        loadedModel.rotation.y = Math.PI / 4;
        loadedModel.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        scene.add(loadedModel);
        console.log('Duck model loaded successfully');
      },
      (progress) => {
        console.log('Loading model...', (progress.loaded / progress.total * 100).toFixed(1) + '%');
      },
      (error) => {
        console.warn('Could not load Duck model, adding fallback:', error);
        // Fallback: create a simple duck shape
        const duckBody = new THREE.Mesh(
          new THREE.SphereGeometry(0.5, 16, 16),
          new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.5 })
        );
        duckBody.scale.set(1, 0.8, 1.3);
        duckBody.position.set(-8, 0.4, 6);
        duckBody.castShadow = true;
        scene.add(duckBody);

        const duckHead = new THREE.Mesh(
          new THREE.SphereGeometry(0.3, 12, 12),
          new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.5 })
        );
        duckHead.position.set(-8, 0.9, 5.3);
        scene.add(duckHead);
      }
    );

    // ===================== HIDE LOADING SCREEN =====================
    setTimeout(() => {
      document.getElementById('loading').classList.add('hidden');
    }, 1500);

    // ===================== WOW FEATURE: Day/Night Cycle =====================
    let timeOfDay = 0; // 0 to 1, where 0.25 = noon, 0.75 = midnight

    function updateDayNight(t) {
      timeOfDay = (t * 0.02) % 1;

      // Sun position
      const sunAngle = timeOfDay * Math.PI * 2 - Math.PI / 2;
      const sunY = Math.sin(sunAngle) * 25;
      const sunX = Math.cos(sunAngle) * 20;
      dirLight.position.set(sunX, Math.max(sunY, -5), 10);

      // Sun intensity based on height
      const sunIntensity = Math.max(0, Math.sin(sunAngle));
      dirLight.intensity = sunIntensity * 2;
      dirLight.color.setHSL(0.08, 0.6, 0.5 + sunIntensity * 0.5);

      // Ambient changes
      ambientLight.intensity = 0.1 + sunIntensity * 0.4;

      // Hemisphere light
      hemiLight.intensity = 0.1 + sunIntensity * 0.3;

      // Lantern glow at night
      const nightFactor = 1 - sunIntensity;
      lanternLight1.intensity = nightFactor * 3;
      lanternLight2.intensity = nightFactor * 3;

      // Fog color shift
      const fogColor = new THREE.Color();
      fogColor.setHSL(0.58, 0.3 + sunIntensity * 0.4, 0.2 + sunIntensity * 0.6);
      scene.fog.color.copy(fogColor);

      // Update skybox tint (re-create would be expensive, so we adjust renderer)
      renderer.toneMappingExposure = 0.3 + sunIntensity * 1.2;
    }

    // ===================== ANIMATION LOOP =====================
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();

      // Update controls
      controls.update();

      // Windmill blades rotation (ANIMATED shape)
      bladesGroup.rotation.z = elapsed * 1.5;

      // Bouncing ball
      bouncingBall.position.y = 0.3 + Math.abs(Math.sin(elapsed * 2)) * 2;

      // Duck bobbing on pond
      if (loadedModel) {
        loadedModel.position.y = 0.05 + Math.sin(elapsed * 1.5) * 0.1;
        loadedModel.rotation.y = Math.PI / 4 + Math.sin(elapsed * 0.5) * 0.3;
      }

      // Day/night cycle
      updateDayNight(elapsed);

      // Lantern flicker
      lanternLight1.intensity = (1 - Math.max(0, Math.sin((timeOfDay * Math.PI * 2) - Math.PI / 2))) * 3 + Math.sin(elapsed * 10) * 0.2;
      lanternLight2.intensity = (1 - Math.max(0, Math.sin((timeOfDay * Math.PI * 2) - Math.PI / 2))) * 3 + Math.sin(elapsed * 10 + 1) * 0.2;

      renderer.render(scene, camera);
    }

    animate();

    // ===================== RESIZE HANDLER =====================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    console.log('Scene loaded with 20+ primary shapes, 3+ light types, skybox, textures, animations, and 3D model');
  </script>
</body>
</html>
